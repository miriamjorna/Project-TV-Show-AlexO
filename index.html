<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Alex Okorefe (Alex-Os-Dev-Lab)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <header>
      <h1>TV Show Episodes</h1>
    </header>

    <!-- provision for search bar -->
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="Search episodes..." />

      <!-- adding a pre-filled episode selector -->
      <select id="episode-select">
        <option value="">-- Select an episode --</option>
      </select>
      <!-- end of episode selector -->
       
      <p id="searchCount"></p>
    </div>

    <div id="root">
      <p class="status-message">Loading episodes...</p>
    </div>

    <footer>
      <p>
        Data provided by
        <a href="https://www.tvmaze.com/" target="_blank">TVMaze.com</a>
      </p>
    </footer>

    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>
  </body>
</html>
